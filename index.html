<script>
const {useState,useEffect,useCallback}=React;
const e=React.createElement;

const N=(v,d=0)=>new Intl.NumberFormat('zh-TW',{maximumFractionDigits:d}).format(v);
const P=v=>`${v>=0?'+':''}${v.toFixed(2)}%`;
const C=v=>v>=0?'#00e5a0':'#ff5e5e';
const FX=32.5;
const PAL=['#0070f3','#00c2ff','#00e5a0','#f5c842','#ff7b54','#c77dff','#ff5e5e','#38bdf8','#fb923c','#a3e635','#e879f9'];
const ML=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const L12=()=>{const n=new Date();return Array.from({length:12},(_,i)=>{const d=new Date(n.getFullYear(),n.getMonth()-11+i,1);return ML[d.getMonth()]});};

const DCA={'0050':{rows:[{days:[10,20,30],amt:2000}]},'2330':{rows:[{days:[10,25],amt:3000}]},'2891':{rows:[{days:[10],amt:1000}]},'00981A':{rows:[{days:[10],amt:2000}]},'VOO':{rows:[{days:[13,23],amt:5000}]}};
const mkDCA=t=>{const d=DCA[t];if(!d)return null;return{...d,total:d.rows.reduce((s,r)=>s+r.days.length*r.amt,0)};};
const mkHist=(cur,avg)=>{const n=12,s=avg*(0.9+Math.random()*0.1);return Array.from({length:n},(_,i)=>{const t=i/(n-1),b=s+(cur-s)*Math.pow(t,1.3);return i===n-1?cur:+(b*(1+(Math.random()*.06-.03))).toFixed(2)});};

const SEED=[
  {id:1,t:'0050',  n:'元大台灣50',      c:'TWD',q:3027, a:72.07,  p:80.75, tx:[]},
  {id:2,t:'00955', n:'中信日本商社',    c:'TWD',q:13000,a:12.16,  p:16.04, tx:[]},
  {id:3,t:'00981A',n:'主動統一台股增長',c:'TWD',q:9013, a:17.37,  p:23.13, tx:[]},
  {id:4,t:'2308',  n:'台達電',          c:'TWD',q:60,   a:1716.2, p:1735,  tx:[]},
  {id:5,t:'2330',  n:'台積電',          c:'TWD',q:222,  a:1566.81,p:2000,  tx:[]},
  {id:6,t:'2891',  n:'中信金',          c:'TWD',q:2019, a:46.45,  p:54,    tx:[]},
  {id:7,t:'3105',  n:'穩懋',            c:'TWD',q:60,   a:450.5,  p:464,   tx:[]},
  {id:8,t:'GOOGL', n:'谷歌 Alphabet',   c:'USD',q:15,   a:267.736,p:318.49,tx:[]},
  {id:9,t:'KO',    n:'可口可樂',        c:'USD',q:20,   a:77.74,  p:78.18, tx:[]},
  {id:10,t:'ONDS', n:'Ondas Inc',       c:'USD',q:200,  a:4.83,   p:9.14,  tx:[]},
  {id:11,t:'VOO',  n:'Vanguard S&P500', c:'USD',q:2,    a:596.845,p:625.02,tx:[]},
];
const SK='pf_v4',AK='pf_api';
const init=()=>{try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s)}catch(e){}return SEED.map((s,i)=>({...s,col:PAL[i%PAL.length],hist:mkHist(s.p,s.a),dca:mkDCA(s.t),loading:false}))};

const stat=s=>{
  let q=s.q,cb=s.a*s.q;
  for(const t of s.tx){if(t.type==='buy'){cb+=t.p*t.q;q+=t.q}else{cb-=(cb/q)*t.q;q-=t.q}}
  const avg=q>0?cb/q:0,mkt=s.p*q,pnl=mkt-cb,pct=cb>0?(pnl/cb)*100:0;
  return{q,avg,cb,mkt,pnl,pct,mktT:s.c==='USD'?mkt*FX:mkt,cbT:s.c==='USD'?cb*FX:cb};
};

async function getPrice(ticker,cur,key){
  if(!key)return null;
  const q=cur==='USD'?`Stock price of ${ticker} USD now? Reply ONLY: {"price":123.45}`:`台股${ticker}現在股價？只回: {"price":123.45}`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:q}]})});
    const d=await r.json();
    const txt=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const m=txt.match(/"price"\s*:\s*([\d.]+)/);
    if(m)return parseFloat(m[1]);
  }catch(err){console.error(err)}
  return null;
}

// SVG Sparkline
function Spark({hist,col,avg}){
  const W=300,H=48,pd=2,mn=Math.min(...hist),mx=Math.max(...hist),rng=mx-mn||1;
  const iW=W-pd*2,iH=H-pd*2;
  const pts=hist.map((v,i)=>[pd+i/(hist.length-1)*iW, pd+iH-((v-mn)/rng)*iH]);
  const path=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area=path+` L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;
  const ay=pd+iH-((avg-mn)/rng)*iH;
  const gid='g'+col.replace('#','');
  return e('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',height:H,display:'block'}},
    e('defs',null,e('linearGradient',{id:gid,x1:'0',y1:'0',x2:'0',y2:'1'},
      e('stop',{offset:'0%',stopColor:col,stopOpacity:.3}),
      e('stop',{offset:'100%',stopColor:col,stopOpacity:0}))),
    e('path',{d:area,fill:`url(#${gid})`}),
    e('path',{d:path,fill:'none',stroke:col,strokeWidth:1.5,strokeLinecap:'round',strokeLinejoin:'round'}),
    ay>0&&ay<H&&e('line',{x1:pd,y1:ay,x2:W-pd,y2:ay,stroke:'#fff2',strokeDasharray:'4 3'}));
}

// SVG Big Chart
function Chart({s,avg}){
  const W=320,H=140,pL=36,pB=18,pT=6,pR=4;
  const vals=s.hist,mn=Math.min(...vals,avg)*.98,mx=Math.max(...vals,avg)*1.02,rng=mx-mn||1;
  const iW=W-pL-pR,iH=H-pB-pT;
  const xp=i=>pL+i/(vals.length-1)*iW;
  const yp=v=>pT+iH-((v-mn)/rng)*iH;
  const line=vals.map((v,i)=>`${i?'L':'M'}${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(' ');
  const labs=L12();
  const fp=v=>s.c==='USD'?`$${v.toFixed(1)}`:N(v,0);
  const tks=[mn,mn+rng/2,mx];
  return e('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',display:'block'}},
    tks.map((v,i)=>e('g',{key:i},
      e('line',{x1:pL,y1:yp(v),x2:W-pR,y2:yp(v),stroke:'#1e2e44',strokeWidth:1}),
      e('text',{x:pL-3,y:yp(v)+4,textAnchor:'end',fill:'#7a8fa6',fontSize:8},fp(v)))),
    labs.filter((_,i)=>i%4===0).map((l,i)=>e('text',{key:i,x:xp(i*4),y:H-2,textAnchor:'middle',fill:'#7a8fa6',fontSize:8},l)),
    e('line',{x1:pL,y1:yp(avg),x2:W-pR,y2:yp(avg),stroke:'#fff2',strokeDasharray:'5 3',strokeWidth:1}),
    e('path',{d:line,fill:'none',stroke:s.col,strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'}));
}

      tot>0&&e('div',{style:{background:'#0a1525',borderRadius:10,padding:'9px 14px',marginBottom:14,display:'flex',justifyContent:'space-between'}},
        e('span',{style:{color:'#7a8fa6',fontSize:13}},'交易金額'),
        e('span',{style:{color:'#e8f0fe',fontWeight:700}},s.c==='USD'?`$${tot.toFixed(2)}`:`NT$${N(tot)}`)),
      e('div',{style:{display:'flex',gap:10}},
        e('button',{onClick:onClose,style:{flex:1,padding:'10px 0',borderRadius:10,border:'1px solid #1e3050',background:'transparent',color:'#7a8fa6',cursor:'pointer',fontWeight:600}},'取消'),
        e('button',{onClick:()=>{if(!q||!p)return;onOk({type,q:parseFloat(q),p:parseFloat(p),dt});onClose();},
          style:{flex:2,padding:'10px 0',borderRadius:10,border:'none',background:type==='buy'?'linear-gradient(135deg,#0070f3,#00c2ff)':'linear-gradient(135deg,#ff5e5e,#ff9e6c)',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:15}},
          `確認${type==='buy'?'買入':'賣出'}`))));
}

// DCA Alert

  return e('div',{style:{position:'fixed',inset:0,background:'rgba(5,12,22,.93)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:400,padding:'0 20px'}},
    e('div',{style:{background:'#0d1b2e',border:'1px solid #f5c84260',borderRadius:22,padding:'26px 22px',width:'100%',maxWidth:340}},
      e('div',{style:{fontSize:28,textAlign:'center',marginBottom:6}},'📅'),
      e('div',{style:{fontFamily:"'DM Serif Display',serif",fontSize:20,color:'#f5c842',textAlign:'center',marginBottom:4}},'定期定額到期提醒'),
      e('div',{style:{color:'#7a8fa6',fontSize:13,textAlign:'center',marginBottom:16}},`今天是 ${al.t} 的扣款日（每月${al.day}日）`),
      e('div',{style:{background:'#0a1525',borderRadius:14,padding:'14px',marginBottom:14}},
        [['標的',`${al.n}（${al.t}）`],['扣款金額',`NT$${N(al.amt)}`],
         ['目前市價',al.c==='USD'?`$${al.p.toFixed(2)}`:`NT$${N(al.p,2)}`],
         ['可買股數',`${sh} 股`],['實際扣款',`NT$${N(ac)}`],['剩餘零頭',`NT$${N(al.amt-ac)}`]
        ].map(([l,v])=>e('div',{key:l,style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #1e2e44'}},
          e('span',{style:{color:'#7a8fa6',fontSize:13}},l),e('span',{style:{color:'#e8f0fe',fontWeight:700,fontSize:13}},v)))),
      alerts.length>1&&e('div',{style:{color:'#7a8fa6',fontSize:12,textAlign:'center',marginBottom:8}},`${i+1} / ${alerts.length}`),
      e('div',{style:{display:'flex',gap:10}},

}

                `${t.type==='buy'?'買入':'賣出'} ${t.q.toLocaleString()} 股`,
                t.dca&&e('span',{style:{marginLeft:6,fontSize:10,padding:'0 5px',borderRadius:6,background:'rgba(245,200,66,.12)',color:'#f5c842'}},'DCA')),
              e('div',{style:{color:'#7a8fa6',fontSize:11}},t.dt))),
          e('div',{style:{textAlign:'right'}},
            e('div',{style:{color:'#e8f0fe',fontWeight:700,fontSize:13}},fp(t.p)),
            e('div',{style:{color:'#7a8fa6',fontSize:11}},`小計 ${fm(t.q*t.p)}`))))),
    s.dca&&e('div',{className:'ani',style:CD},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        e('div',{style:{color:'#7a8fa6',fontSize:11}},'📅 定期定額明細'),
        e('div',{style:{fontSize:14,fontWeight:800,color:'#f5c842'}},`每月合計 NT$${N(s.dca.total)}`)),
      s.dca.rows.map((r,i)=>
        e('div',{key:i,style:{background:'#0a1525',borderRadius:12,padding:'13px 16px'}},
          e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
            [['扣款日期',`每月 ${r.days.join('、')} 日`],['每次金額',`NT$${N(r.amt)}`],
             ['每月次數',`${r.days.length} 次`],['單標小計',`NT$${N(r.days.length*r.amt)}`]].map(([l,v])=>
              e('div',{key:l},e('div',{style:{color:'#7a8fa6',fontSize:11,marginBottom:2}},l),e('div',{style:{color:'#e8f0fe',fontWeight:700,fontSize:13}},v)))),
          e('div',{style:{borderTop:'1px solid #1e2e44',paddingTop:10,display:'flex',justifyContent:'space-between'}},
            e('span',{style:{color:'#7a8fa6',fontSize:12}},`${r.days.length}次 × NT$${N(r.amt)}`),
            e('span',{style:{color:'#f5c842',fontWeight:800}},`= NT$${N(r.days.length*r.amt)}/月`))))),
    showTx&&e(TxModal,{s,onClose:()=>setShowTx(false),onOk:t=>onTx(s.id,t)}));
}

// Donut
function Donut({stocks,tot}){
  const sz=110,cx=55,cy=55,r=42,sw=18,ci=2*Math.PI*r;
  let off=0;
  const sl=stocks.map(s=>{const sh=stat(s).mktT/tot,da=sh*ci,x={...s,da,of:off};off+=da;return x;});
  return e('div',{style:{display:'flex',alignItems:'center',gap:14}},
    e('svg',{width:sz,height:sz,style:{flexShrink:0}},
      e('circle',{cx,cy,r,fill:'none',stroke:'#1a2a3e',strokeWidth:sw}),
      sl.map(s=>e('circle',{key:s.id,cx,cy,r,fill:'none',stroke:s.col,strokeWidth:sw,strokeDasharray:`${s.da} ${ci}`,strokeDashoffset:-s.of,transform:`rotate(-90 ${cx} ${cy})`})),
      e('text',{x:cx,y:cy-5,textAnchor:'middle',fill:'#e8f0fe',fontSize:9,fontWeight:700},'總市值'),
      e('text',{x:cx,y:cy+7,textAnchor:'middle',fill:'#7a8fa6',fontSize:8},'TWD換算')),
    e('div',{style:{flex:1}},
      stocks.slice(0,7).map(s=>e('div',{key:s.id,style:{display:'flex',alignItems:'center',gap:5,marginBottom:3}},
        e('div',{style:{width:7,height:7,borderRadius:2,background:s.col,flexShrink:0}}),
        e('div',{style:{fontSize:11,color:'#a0b0c0',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},s.t),
        e('div',{style:{fontSize:11,color:'#e8f0fe',fontWeight:600}},(stat(s).mktT/tot*100).toFixed(1)+'%')))));
}

// Main
function App(){
  const [stocks,setStocks]=useState(init);
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState('all');
  const [loading,setLoading]=useState(false);
  const [updated,setUpdated]=useState(null);
  const [alerts,setAlerts]=useState([]);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(AK)||'');
  const [showKey,setShowKey]=useState(false);

  useEffect(()=>{try{localStorage.setItem(SK,JSON.stringify(stocks))}catch(e){}},[stocks]);

  const refresh1=useCallback(async id=>{
    setStocks(prev=>prev.map(s=>s.id===id?{...s,loading:true}:s));
    const s=stocks.find(s=>s.id===id);
    const p=await getPrice(s.t,s.c,apiKey);
    setStocks(prev=>prev.map(s=>s.id===id?{...s,p:p??s.p,loading:false,hist:[...s.hist.slice(0,-1),p??s.p]}:s));
  },[stocks,apiKey]);

  const refreshAll=useCallback(async()=>{
    if(!apiKey){setShowKey(true);return;}
    setLoading(true);
    setStocks(prev=>prev.map(s=>({...s,loading:true})));
    await Promise.all(stocks.map(async s=>{
      const p=await getPrice(s.t,s.c,apiKey);
      if(p)setStocks(prev=>prev.map(x=>x.id===s.id?{...x,p,loading:false,hist:[...x.hist.slice(0,-1),p]}:x));
      else setStocks(prev=>prev.map(x=>x.id===s.id?{...x,loading:false}:x));
    }));
    setLoading(false);
    const now=new Date();setUpdated(now);
    const today=now.getDate(),al=[];
    stocks.forEach(s=>{if(!s.dca)return;s.dca.rows.forEach(r=>{if(r.days.includes(today))al.push({id:s.id,t:s.t,n:s.n,c:s.c,p:s.p,amt:r.amt,day:today});});});
    setAlerts(al);
  },[stocks,apiKey]);

  useEffect(()=>{if(apiKey)refreshAll();},[]);// eslint-disable-line

  const saveKey=k=>{setApiKey(k);if(k)localStorage.setItem(AK,k);setShowKey(false);if(k)setTimeout(refreshAll,300);};
  const addTx=(id,t)=>setStocks(prev=>prev.map(s=>s.id===id?{...s,tx:[...s.tx,{...t}]}:s));
  const okDCA=(al,sh)=>{if(sh<=0)return;const dt=new Date().toISOString().slice(0,10);setStocks(prev=>prev.map(s=>s.id===al.id?{...s,tx:[...s.tx,{type:'buy',q:sh,p:al.p,dt,dca:true}]}:s));};

  const fil=tab==='twd'?stocks.filter(s=>s.c==='TWD'):tab==='usd'?stocks.filter(s=>s.c==='USD'):tab==='dca'?stocks.filter(s=>s.dca):stocks;
  const totT=stocks.reduce((s,x)=>s+stat(x).mktT,0);
  const cbT=stocks.reduce((s,x)=>s+stat(x).cbT,0);
  const pnlT=totT-cbT,pctT=cbT>0?(pnlT/cbT)*100:0;
  const selS=sel?stocks.find(s=>s.id===sel):null;

  return e('div',{style:{minHeight:'100vh',background:'#060e1a'}},
    e('div',{style:{position:'fixed',inset:0,pointerEvents:'none',background:'radial-gradient(ellipse 60% 40% at 15% 0%,rgba(0,112,243,.10) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 85% 85%,rgba(0,229,160,.06) 0%,transparent 70%)'}}),
    e('div',{style:{position:'relative',maxWidth:480,margin:'0 auto',padding:'0 16px'}},
      selS
        ?e('div',{style:{paddingTop:28}},e(Detail,{s:selS,onBack:()=>setSel(null),onTx:addTx,onRefresh:()=>refresh1(selS.id)}))
        :e(React.Fragment,null,
          e('div',{style:{padding:'28px 0 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
            e('div',null,
              e('div',{style:{fontFamily:"'DM Serif Display',serif",fontSize:24}},'投資組合'),
              e('div',{style:{color:'#7a8fa6',fontSize:12}},'Portfolio Tracker')),
            e('div',{style:{display:'flex',gap:8}},
              e('button',{onClick:()=>setShowKey(true),style:{padding:'8px 11px',borderRadius:11,border:'1px solid #1e3050',background:'#0d1b2e',color:'#7a8fa6',cursor:'pointer',fontSize:13}},'🔑'),
              e('button',{onClick:refreshAll,disabled:loading,style:{padding:'8px 14px',borderRadius:11,border:'none',cursor:loading?'not-allowed':'pointer',fontWeight:700,fontSize:13,background:loading?'#1e2e44':'linear-gradient(135deg,#0070f3,#00c2ff)',color:loading?'#3a5070':'#fff',display:'flex',alignItems:'center',gap:6}},
                loading?'⟳ 更新中':'🔄 更新全部'))),
          updated&&e('div',{style:{color:'#3a5070',fontSize:11,marginBottom:12}},`最後更新：${updated.toLocaleTimeString('zh-TW')}`),
          !apiKey&&e('div',{onClick:()=>setShowKey(true),style:{background:'rgba(0,112,243,.1)',border:'1px solid rgba(0,112,243,.3)',borderRadius:12,padding:'10px 16px',marginBottom:14,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}},
            e('span',{style:{color:'#60a5fa',fontSize:13}},'🔑 設定 API Key 啟用即時股價'),
            e('span',{style:{color:'#0070f3',fontSize:12,fontWeight:700}},'設定 →')),
          e('div',{className:'ani',style:{...CD,borderRadius:22,padding:'22px 20px',marginBottom:16,position:'relative',overflow:'hidden'}},
            e('div',{style:{position:'absolute',top:-30,right:-30,width:130,height:130,borderRadius:'50%',background:'radial-gradient(circle,rgba(0,112,243,.12),transparent 70%)'}}),
            e('div',{style:{color:'#7a8fa6',fontSize:12,marginBottom:6}},'總資產市值（台幣換算）'),
            e('div',{style:{fontFamily:"'DM Serif Display',serif",fontSize:32,letterSpacing:'-.5px',marginBottom:6}},`NT$ ${N(totT)}`),
            e('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:18}},
              e(Bdg,{v:pctT}),
              e('span',{style:{color:'#7a8fa6',fontSize:13}},`${pnlT>=0?'+':''}NT$${N(pnlT)} 未實現損益`)),
            e(Donut,{stocks,tot:totT})),
          e('div',{style:{display:'flex',gap:6,marginBottom:14}},
            [['all','全部'],['twd','台股'],['usd','美股'],['dca','定期定額']].map(([k,l])=>
              e('button',{key:k,onClick:()=>setTab(k),style:{flex:1,padding:'7px 0',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,background:tab===k?'linear-gradient(135deg,#0070f3,#00c2ff)':'#0d1b2e',color:tab===k?'#fff':'#7a8fa6',outline:tab===k?'none':'1px solid #1e3050'}},l))),
          tab==='dca'&&e('div',{className:'ani',style:{...CD,marginBottom:14}},
            e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}},
              [['台股每月總扣款',`NT$${N(stocks.filter(s=>s.dca&&s.c==='TWD').reduce((s,x)=>s+x.dca.total,0))}`,'#00e5a0'],
               ['美股每月總扣款',`NT$${N(stocks.filter(s=>s.dca&&s.c==='USD').reduce((s,x)=>s+x.dca.total,0))}`,'#60a5fa']].map(([l,v,c])=>
                e('div',{key:l,style:{background:'#0a1525',borderRadius:12,padding:'12px 14px'}},
                  e('div',{style:{color:'#7a8fa6',fontSize:11,marginBottom:4}},l),
                  e('div',{style:{color:c,fontWeight:800,fontSize:18}},v)))),
            stocks.filter(s=>s.dca).map(s=>{const r=s.dca.rows[0];return e('div',{key:s.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid #1e2e44'}},
              e('div',{style:{display:'flex',alignItems:'center',gap:8}},
                e('div',{style:{width:8,height:8,borderRadius:2,background:s.col}}),
                e('div',null,
                  e('div',{style:{color:'#e8f0fe',fontWeight:700,fontSize:13}},s.n),
                  e('div',{style:{color:'#7a8fa6',fontSize:11}},`每月${r.days.join('、')}日 × NT$${N(r.amt)} × ${r.days.length}次`))),
              e('div',{style:{color:'#f5c842',fontWeight:800,fontSize:14}},`NT$${N(s.dca.total))`))}),
            e('div',{style:{marginTop:12,padding:'10px 14px',background:'#0a1525',borderRadius:12,display:'flex',justifyContent:'space-between'}},
              e('span',{style:{color:'#7a8fa6',fontSize:13}},'每月總投入'),
              e('span',{style:{color:'#f5c842',fontSize:16,fontWeight:800}},`NT$${N(stocks.filter(s=>s.dca).reduce((s,x)=>s+x.dca.total,0))}`))),
          e('div',{style:{display:'flex',flexDirection:'column',gap:10,paddingBottom:40}},
            fil.map(s=>{
              const st=stat(s);
              const fp=v=>s.c==='USD'?`$${v.toFixed(2)}`:`NT$${N(v,s.a>=100?1:2)}`;
              const fm=v=>s.c==='USD'?`$${v.toFixed(0)}`:`NT$${N(v)}`;
              return e('div',{key:s.id,onClick:()=>setSel(s.id),className:'ani',style:{background:'linear-gradient(135deg,#0d1f35,#0a1828)',border:'1px solid #1e3050',borderRadius:18,padding:'16px 18px',cursor:'pointer'}},
                e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
                  e('div',null,
                    e('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:2}},
                      e('div',{style:{width:8,height:8,borderRadius:2,background:s.col}}),
                      e('span',{style:{color:'#7a8fa6',fontSize:12}},s.t),
                      s.loading&&e('span',{style:{fontSize:12,color:'#0070f3',display:'inline-block',animation:'spin 1s linear infinite'}},'⟳'),
                      s.dca&&e('span',{style:{fontSize:10,padding:'0 5px',borderRadius:8,background:'rgba(245,200,66,.12)',color:'#f5c842'}},'DCA')),
                    e('div',{style:{fontWeight:700,fontSize:15,color:'#e8f0fe'}},s.n)),
                  e(Bdg,{v:st.pct})),
                e('div',{style:{margin:'8px 0 6px'}},e(Spark,{hist:s.hist,col:s.col,avg:s.a})),
                e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7}},
                  [['市值',fm(st.mkt)],['均成本',fp(st.avg)],['損益',(st.pnl>=0?'+':'')+fm(st.pnl)]].map(([l,v])=>
                    e('div',{key:l,style:{background:'#0a1525',borderRadius:9,padding:'8px 10px'}},
                      e('div',{style:{color:'#7a8fa6',fontSize:10,marginBottom:2}},l),
                      e('div',{style:{fontWeight:700,fontSize:12,color:l==='損益'?C(st.pnl):'#e8f0fe'}},v)))),
                s.dca&&e('div',{style:{marginTop:8,background:'rgba(245,200,66,.07)',borderRadius:9,padding:'7px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',border:'1px solid rgba(245,200,66,.15)'}},
                  e('span',{style:{color:'#f5c842',fontSize:11}},'📅 每月定扣'),
                  e('span',{style:{color:'#f5c842',fontWeight:700,fontSize:13}},`NT$ ${N(s.dca.total)}`)));})))),
    alerts.length>0&&e(DcaModal,{alerts,onOk:okDCA,onAll:()=>setAlerts([])}),
    showKey&&e(KeyModal,{onSave:saveKey}));
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
</body>
</html>
